<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POSTECSA — Limpiar caché</title>
<style>
body{font-family:Arial,sans-serif;background:#E65100;min-height:100vh;
     display:flex;align-items:center;justify-content:center;margin:0;padding:20px;}
.box{background:#fff;border-radius:16px;padding:32px 24px;max-width:360px;
     width:100%;text-align:center;}
h2{color:#E65100;margin-bottom:8px;}
p{color:#546E7A;font-size:14px;margin-bottom:20px;}
button{background:#E65100;color:#fff;border:none;border-radius:10px;
       padding:14px 24px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-bottom:10px;}
.log{background:#f5f5f5;border-radius:8px;padding:12px;font-size:12px;
     text-align:left;margin-top:16px;max-height:200px;overflow-y:auto;}
</style>
</head>
<body>
<div class="box">
  <h2>🔄 Limpiar Caché</h2>
  <p>Borra el caché del Service Worker y abre la app fresca.</p>
  <button onclick="limpiar()">🗑️ Limpiar todo y abrir app</button>
  <div class="log" id="log">Toca el botón para limpiar...</div>
</div>
<script>
function log(msg){
  var el=document.getElementById('log');
  el.innerHTML+=msg+'<br>';
  el.scrollTop=el.scrollHeight;
}
async function limpiar(){
  log('Iniciando limpieza...');
  try{
    // 1. Desregistrar todos los SW
    if('serviceWorker' in navigator){
      var regs=await navigator.serviceWorker.getRegistrations();
      for(var r of regs){
        await r.unregister();
        log('✅ SW desregistrado: '+r.scope);
      }
      if(regs.length===0) log('ℹ️ No había SW registrados');
    }
    // 2. Borrar todos los cachés
    var keys=await caches.keys();
    for(var k of keys){
      await caches.delete(k);
      log('✅ Caché borrado: '+k);
    }
    if(keys.length===0) log('ℹ️ No había cachés');
    // 3. Limpiar sessionStorage
    try{sessionStorage.clear();log('✅ sessionStorage limpiado');}catch(e){}
    log('');
    log('✅ Limpieza completa. Abriendo app...');
    // 4. Abrir la app con timestamp para forzar descarga nueva
    setTimeout(function(){
      window.location.href='/postecsa-om/index.html?nocache='+Date.now();
    }, 1500);
  }catch(e){
    log('❌ Error: '+e.message);
    log('Intenta manualmente: Configuración → Privacidad → Borrar datos');
  }
}
// Ejecutar automáticamente al cargar
window.onload=function(){ setTimeout(limpiar, 500); };
</script>
</body>
</html>
