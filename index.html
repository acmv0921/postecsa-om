<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<title>POSTECSA · OM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f3f8;color:#222;font-size:15px;}
:root{--az:#1a3a5c;--azm:#235a8a;--azc:#2d7dd2;--na:#e87722;--ve:#2e7d32;--vec:#e8f5e9;--ro:#c62828;--am:#f9a825;--amc:#fffde7;--gb:#f0f3f8;--gb2:#cdd5e0;--gt:#5a6472;--bl:#fff;}
.tb{background:linear-gradient(135deg,var(--az),var(--azm));padding:8px 13px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.tb img{height:33px;width:auto;}
.tb h1{color:#fff;font-size:13px;font-weight:700;flex:1;}
.ver{font-size:10px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.12);padding:2px 8px;border-radius:20px;}
.back{background:rgba(255,255,255,.15);border:none;color:#fff;width:31px;height:31px;border-radius:7px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wrap{padding:12px 13px 90px;max-width:540px;margin:0 auto;}
.card{background:var(--bl);border-radius:10px;box-shadow:0 2px 10px rgba(26,58,92,.1);padding:13px;margin-bottom:11px;}
.card-t{font-size:11px;font-weight:800;color:var(--az);text-transform:uppercase;letter-spacing:.4px;margin-bottom:11px;padding-bottom:6px;border-bottom:2px solid var(--gb);display:flex;align-items:center;gap:5px;}
.fr{margin-bottom:9px;}
label{display:block;font-size:11px;font-weight:600;color:var(--gt);margin-bottom:3px;}
.req{color:var(--ro);}
input,select,textarea{width:100%;border:1.5px solid var(--gb2);border-radius:7px;padding:8px 10px;font-size:14px;color:#222;background:#fff;outline:none;font-family:inherit;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--azc);}
textarea{resize:vertical;min-height:60px;}
.btn-nva{background:var(--na);color:#fff;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 12px rgba(232,119,34,.35);margin-bottom:13px;border:none;width:100%;text-align:left;}
.btn-nva:active{opacity:.85;}
.stit{font-size:11px;font-weight:800;color:var(--az);text-transform:uppercase;letter-spacing:.5px;margin:13px 0 7px;}
.oi{background:var(--bl);border-radius:10px;box-shadow:0 2px 8px rgba(26,58,92,.1);padding:11px 12px;display:flex;align-items:center;gap:9px;margin-bottom:8px;cursor:pointer;border-left:4px solid var(--gb2);}
.oi.inicio{border-left-color:var(--am);}.oi.avance{border-left-color:var(--azc);}.oi.cerrada{border-left-color:var(--ve);}
.on{font-weight:800;font-size:13px;color:var(--az);}.od{font-size:11px;color:var(--gt);margin-top:2px;}
.oe{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.est-i{background:var(--amc);color:#7a5500;}.est-a{background:#e3f2fd;color:#1565c0;}.est-c{background:var(--vec);color:var(--ve);}
.oarr{color:var(--gb2);font-size:17px;}
.empty{text-align:center;padding:14px;color:var(--gt);font-size:12px;}
.tabs{display:flex;background:var(--azm);padding:0 7px;gap:2px;}
.tab{flex:1;padding:8px 2px;text-align:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.45);cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;letter-spacing:.3px;}
.tab.on{color:#fff;border-bottom-color:var(--na);}.tab.ok{color:rgba(255,255,255,.72);}.tab.no{opacity:.3;cursor:not-allowed;}
.cnt{font-size:10px;font-weight:600;color:var(--gt);margin-left:auto;}
.btn-act{width:100%;padding:9px;border:2px dashed var(--na);border-radius:8px;background:rgba(232,119,34,.06);color:var(--na);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.it{width:100%;border-collapse:collapse;font-size:11px;margin-top:7px;}
.it th{background:var(--az);color:#fff;padding:5px;text-align:left;font-size:10px;font-weight:700;}
.it td{padding:4px;border-bottom:1px solid var(--gb);vertical-align:middle;}
.it input,.it select{padding:3px;font-size:10px;}
.vb{padding:3px 5px;border-radius:4px;border:1.5px solid var(--gb2);background:#fff;font-size:10px;font-weight:700;cursor:pointer;}
.vb.si.on{background:var(--vec);border-color:var(--ve);color:var(--ve);}.vb.no.on{background:#fff3e0;border-color:#e65100;color:#e65100;}
.bdel{background:none;border:none;cursor:pointer;color:var(--ro);font-size:13px;padding:2px;}
.bam{width:100%;margin-top:7px;padding:6px;border:1.5px dashed var(--gb2);border-radius:6px;background:none;color:var(--gt);font-size:11px;cursor:pointer;}
.mdrop{display:none;}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:7px;}
.ft{aspect-ratio:1;border-radius:7px;background:var(--gb);border:2px dashed var(--gb2);overflow:hidden;position:relative;}
.ft img{width:100%;height:100%;object-fit:cover;}
.ft-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:19px;height:19px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fcam,.fgal{flex:1;padding:10px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;color:#fff;display:inline-flex;align-items:center;justify-content:center;gap:5px;}
.fcam{background:var(--az);}.fgal{background:var(--na);}
.fcam:active,.fgal:active{opacity:.8;}
input[type=file]{display:none!important;width:0!important;height:0!important;}
.cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--gb2);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;}
.cb.on{background:var(--ve);border-color:var(--ve);}
.cb.on::after{content:'✓';color:#fff;font-size:12px;font-weight:900;}
canvas.fc{width:100%;height:130px;display:block;background:#fafcff;cursor:crosshair;touch-action:none;}
.fbf{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--gb2);background:#fff;color:var(--gt);}
.fbf.cf{background:var(--az);color:#fff;border-color:var(--az);}.fbf.cn{background:var(--na);color:#fff;border-color:var(--na);}
.costo-box{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border:2px solid var(--ve);border-radius:9px;padding:11px 13px;margin:7px 0 11px;}
.wa-msg{background:#dcf8c6;border-radius:9px;padding:10px 12px;font-family:monospace;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-word;border:1px solid #b2dfdb;margin-top:8px;max-height:220px;overflow-y:auto;}
.her{background:#f0f5ff;border:1.5px solid #c8d8f0;border-radius:9px;padding:9px 11px;font-size:11px;line-height:1.85;color:#333;margin-bottom:10px;}
.her-t{font-size:10px;font-weight:800;color:#1565c0;text-transform:uppercase;margin-bottom:5px;}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--gb2);padding:7px 12px 12px;display:flex;gap:8px;max-width:540px;margin:0 auto;z-index:90;}
.bg{flex:1;padding:11px;border-radius:8px;border:none;background:var(--az);color:#fff;font-weight:700;font-size:13px;cursor:pointer;}
.bn{flex:1;padding:11px;border-radius:8px;border:none;background:var(--na);color:#fff;font-weight:700;font-size:13px;cursor:pointer;}
.bg:active,.bn:active{opacity:.85;}
.ibn{background:#eaf3ff;border-left:4px solid var(--azc);border-radius:5px;padding:7px 10px;font-size:11px;color:var(--az);margin-bottom:10px;}
.sb{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--vec);color:var(--ve);font-weight:700;margin-left:5px;}
.sb.off{background:#fff3e0;color:#e65100;}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(8px);background:#333;color:#fff;padding:8px 15px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;transition:all .3s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

function nuevaOM(){
  OM={num:'',estado:'inicio',mecCed:'',mecNom:'',mecCargo:'',autoriza:'',area:'',equipo:'',tipo:'',
    ins_i:[],ins_a:[],ins_c:[],fotos_i:[],fotos_a:[],fotos_c:[],
    acts:{inicio:[],avance:[],cierre:[]},chkA:{},chkC:{},firmas:{},
    avance:{aut:''},cierre:{tiempo:'',estado:'',obs:'',aut:''},
    creadoEn:new Date().toISOString()};
  INS={i:[],a:[],c:[]};FOTOS={i:[],a:[],c:[]};
  ACTS={inicio:[],avance:[],cierre:[]};
  CHKA={};CHKC={};FIR={};
  CHK.forEach(x=>{CHKA[x]=false;CHKC[x]=false;});
  showForm('inicio');
}

function abrirOM(num){
  const om=DB.load().find(o=>o.num===num);
  if(!om){toast('OM no encontrada');return;}
  OM=JSON.parse(JSON.stringify(om));
  INS.i=OM.ins_i||[];INS.a=OM.ins_a||[];INS.c=OM.ins_c||[];
  FOTOS.i=OM.fotos_i||[];FOTOS.a=OM.fotos_a||[];FOTOS.c=OM.fotos_c||[];
  ACTS.inicio=OM.acts?.inicio||[];ACTS.avance=OM.acts?.avance||[];ACTS.cierre=OM.acts?.cierre||[];
  CHKA={...OM.chkA};CHKC={...OM.chkC};
  CHK.forEach(x=>{if(CHKA[x]===undefined)CHKA[x]=false;if(CHKC[x]===undefined)CHKC[x]=false;});
  FIR={...(OM.firmas||{})};
  showForm(OM.estado==='cerrada'?'cierre':OM.estado);
}

// ── FORM ──
function showForm(eta){
  ETA=eta;
  const perm={inicio:true,avance:OM.estado!=='inicio',cierre:OM.estado==='cierre'||OM.estado==='cerrada'};
  if(!perm[eta]){toast('⚠️ Complete el Inicio primero');return;}
  const tC=e=>e===eta?'tab on':perm[e]?'tab ok':'tab no';
  const cntI=ACTS.inicio.length+(FOTOS.i.length?'📷'+FOTOS.i.length:'');
  const cntA=ACTS.avance.length+(FOTOS.a.length?'📷'+FOTOS.a.length:'');
  const cntC=ACTS.cierre.length+(FOTOS.c.length?'📷'+FOTOS.c.length:'');
  const btnTxt=eta==='inicio'?'Guardar Inicio →':eta==='avance'?'Guardar Avance →':'✓ Cerrar OM';
  const mecOpts=MECS.map(m=>`<option value="${m.v}"${OM.mecCed&&m.v.startsWith(OM.mecCed)?' selected':''}>${m.l}</option>`).join('');
  const aOpts=Object.keys(SUBS).map(a=>`<option value="${a}"${a===OM.area?' selected':''}>${a}</option>`).join('');
  const sOpts=(SUBS[OM.area]||[]).map(s=>`<option${s===OM.equipo?' selected':''}>${s}</option>`).join('');
  const tOpts=['Falla mecánica','Falla eléctrica','Falla neumática','Falla hidráulica','Falla de Molde','Falta de energía externa','Falta de personal','Falta de materia prima','Falta de aire comprimido','Falta de agua','Producción lenta','Revisión máquina','Alistamiento de máquina','Recogida de material','Cambio de láminas','Cambio de molde','Cuadre de alturas','Estado del clima','Apoyo en otra área','Reunión de personal','Mantenimiento programado','Engrase de máquina','Otro'].map(t=>`<option${t===OM.tipo?' selected':''}>${t}</option>`).join('');

  let body='';
  if(eta==='inicio') body=hInicio(mecOpts,aOpts,sOpts,tOpts);
  else if(eta==='avance') body=hAvance();
  else body=hCierre();

  R(`<div class="tb">
    <button class="back" onclick="home()">←</button>
    <img src="${LOGO_B64}" alt="PST" style="height:26px">
    <h1>${OM.num||'Nueva OM'}</h1>
  </div>
  <div class="tabs">
    <div class="${tC('inicio')}" onclick="irEta('inicio')">📋 Inicio ${ACTS.inicio.length?'('+ACTS.inicio.length+')':''}</div>
    <div class="${tC('avance')}" onclick="irEta('avance')">⚙️ Avance ${ACTS.avance.length?'('+ACTS.avance.length+')':''}</div>
    <div class="${tC('cierre')}" onclick="irEta('cierre')">🔒 Cierre ${ACTS.cierre.length?'('+ACTS.cierre.length+')':''}</div>
  </div>
  <div class="wrap">${body}</div>
  <div class="footer">
    <button class="bg" onclick="guardar()">💾 Guardar</button>
    ${OM.estado!=='cerrada'?`<button class="bn" onclick="avanzar()">${btnTxt}</button>`:''}
  </div>`);

  setTimeout(()=>{initFotos();initFirmas();if(eta==='cierre'){calcCosto();setTimeout(genWA,300);}},80);
}

function irEta(e){
  capturar();
  const p={inicio:true,avance:OM.estado!=='inicio',cierre:OM.estado==='cierre'||OM.estado==='cerrada'};
  if(!p[e]){toast('⚠️ Complete el Inicio primero');return;}
  showForm(e);
}

// ── FIRMAS ──
function initFirmas(){['ma','aa','mc','ac'].forEach(k=>initF(k));}
function initF(k){
  const cv=document.getElementById('cv-'+k);if(!cv)return;
  const w=cv.offsetWidth,h=cv.offsetHeight;
  if(!w||!h){setTimeout(()=>initF(k),200);return;}
  const dpr=window.devicePixelRatio||1;
  cv.width=w*dpr;cv.height=h*dpr;
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);ctx.strokeStyle='#1a3a5c';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  if(!FIR[k])FIR[k]={ctx,dataURL:null,ok:false,drawing:false};else FIR[k].ctx=ctx;
  const url=FIR[k].dataURL||OM?.firmas?.[k];
  if(url){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,w,h);img.src=url;FIR[k].dataURL=url;FIR[k].ok=true;const ok=document.getElementById('ok-'+k);if(ok)ok.style.display='inline';}
  const pos=ev=>{const r=cv.getBoundingClientRect();const t=ev.touches?ev.touches[0]:ev;return{x:t.clientX-r.left,y:t.clientY-r.top};};
  cv.onmousedown=ev=>{FIR[k].drawing=true;ctx.beginPath();const p=pos(ev);ctx.moveTo(p.x,p.y);};
  cv.onmousemove=ev=>{if(!FIR[k].drawing)return;const p=pos(ev);ctx.lineTo(p.x,p.y);ctx.stroke();};
  cv.onmouseup=()=>FIR[k].drawing=false;
  cv.ontouchstart=ev=>{ev.preventDefault();FIR[k].drawing=true;ctx.beginPath();const p=pos(ev);ctx.moveTo(p.x,p.y);};
  cv.ontouchmove=ev=>{ev.preventDefault();if(!FIR[k].drawing)return;const p=pos(ev);ctx.lineTo(p.x,p.y);ctx.stroke();};
  cv.ontouchend=()=>FIR[k].drawing=false;
}
function borrarF(k){const cv=document.getElementById('cv-'+k);const f=FIR[k];if(!cv||!f?.ctx)return;f.ctx.clearRect(0,0,cv.offsetWidth,cv.offsetHeight);f.dataURL=null;f.ok=false;const ok=document.getElementById('ok-'+k);if(ok)ok.style.display='none';toast('Firma borrada');}
function confirmarF(k){
  const cv=document.getElementById('cv-'+k);const f=FIR[k];
  if(!cv||!f?.ctx){toast('⚠️ Reintente');return;}
  const d=f.ctx.getImageData(0,0,cv.width,cv.height).data;
  if(!Array.from(d).some((v,i)=>i%4===3&&v>0)){toast('⚠️ Dibuje la firma primero');return;}
  f.dataURL=cv.toDataURL('image/png');f.ok=true;
  const ok=document.getElementById('ok-'+k);if(ok)ok.style.display='inline';
  toast('✅ Firma confirmada');
}

// ── COSTO ──
function calcCosto(){
  const tI=ACTS.inicio.reduce((s,a)=>s+(+a.tiempo||0),0);
  const tA=ACTS.avance.reduce((s,a)=>s+(+a.tiempo||0),0);
  const tC=ACTS.cierre.reduce((s,a)=>s+(+a.tiempo||0),0);
  const sumaActs=tI+tA+tC;
  const campoEl=document.getElementById('f-tiempo');
  if(campoEl&&!campoEl.value&&sumaActs>0) campoEl.value=sumaActs;
  const mins=Math.max(campoEl?+campoEl.value||0:0, sumaActs);
  const costo=Math.round(mins*TARIFA);
  const cv=document.getElementById('costo-v');
  const cd=document.getElementById('costo-d');
  const ct=document.getElementById('costo-t');
  if(cv) cv.textContent=mins>0?fCOP(costo):'$0';
  if(cd) cd.textContent=mins>0?(mins+' min = '+(mins/60).toFixed(1)+'h'):'Ingrese los minutos';
  if(ct) ct.textContent='Inicio: '+tI+' min | Avance: '+tA+' min | Cierre: '+tC+' min | TOTAL: '+sumaActs+' min';
  return{mins,costo,str:fCOP(costo)};
}

function getCosto(){
  // Leer de ACTS (memoria) o OM.acts (persistido) — el que tenga más datos
  const inicio=[...(ACTS.inicio.length?ACTS.inicio:OM?.acts?.inicio||[])];
  const avance=[...(ACTS.avance.length?ACTS.avance:OM?.acts?.avance||[])];
  const cierre=[...(ACTS.cierre.length?ACTS.cierre:OM?.acts?.cierre||[])];
  const all=[...inicio,...avance,...cierre];
  const mins=Math.max(all.reduce((s,a)=>s+(+a.tiempo||0),0),+OM?.cierre?.tiempo||0);
  return{mins,str:fCOP(Math.round(mins*TARIFA)),all,inicio,avance,cierre};
}

function enviarGerencia(){

    toast('✅ Datos enviados a Gerencia');
  }).catch(e=>{

  });
}
async function sincGAS(action){
  const _cost=getCosto();
  const _insGAS=[...(INS.a&&INS.a.length?INS.a:(OM?.ins_a||[])),
                 ...(INS.c&&INS.c.length?INS.c:(OM?.ins_c||[]))];
  const _actsGAS=_cost.all||[];

  if(action!=='cerrar'){
    // Solo registrar borrador localmente
    console.log('Borrador guardado localmente:', OM.num);
    return;
  }

  // Construir payload para Gerencia
  const payload={
    action:'registrarOT',
    otNum:String(OM.num||''),
    fecha:new Date().toLocaleDateString('es-CO'),
    tipo:String(OM.tipo||''),
    prioridad:'Normal',
    equipo:String(OM.equipo||''),
    area:String(OM.area||''),
    mecanico:String(OM.mecNom||''),
    cedula:String(OM.mecCed||''),
    falla:String(OM.tipo||''),
    trabajo:_actsGAS.map((a,i)=>(i+1)+'. '+String(a.desc||'')).join(' | ').substring(0,500),
    causa:String(OM.tipo||''),
    paro:_cost.mins||0,
    costoMO:Math.round((_cost.mins||0)*TARIFA),
    estado:String(OM.cierre?.estado||''),
    observaciones:String(OM.cierre?.obs||''),
    autorizaCierre:String(OM.cierre?.aut||''),
    materiales:_insGAS.map(m=>({
      nombre:String(m.nombre||''),
      unidad:String(m.unidad||'und'),
      cantidad:+(m.cantidad||1),
      precioUnit:+(m.precio||0),
      total:+(m.precio||0)*(+(m.cantidad||1)),
      codAlm:String(m.codAlm||''),
      marca:m.tieneMarca===false?'S/M':String(m.marca||''),
      modelo:String(m.modelo||'')
    })),
    totalActividades:_actsGAS.length
  };

  console.log('📤 Enviando a GAS Gerencia:', payload.otNum, 
              'acts:', payload.totalActividades,
              'mats:', payload.materiales.length);

  try{
    await Promise.race([
      fetch(GAS,{
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify(payload)
      }),
      new Promise((_,j)=>setTimeout(()=>j(new Error('timeout 10s')),10000))
    ]);
    console.log('✅ GAS OK para:', payload.otNum);
    // Marcar como enviado
    const oms=DB.load();
    const idx=oms.findIndex(o=>o.num===OM.num);
    if(idx>=0){oms[idx].sincGerencia=true;oms[idx].sincAt=new Date().toISOString();DB.save(oms);}
  }catch(e){
    console.warn('⚠️ GAS falló:', e.message);
    // Guardar en cola para reintento
    try{
      const cola=JSON.parse(localStorage.getItem('pst_cola')||'[]');
      if(!cola.some(p=>p.otNum===payload.otNum)){
        cola.push(payload);
        localStorage.setItem('pst_cola',JSON.stringify(cola));
        toast('⚠️ Sin conexión — se reintentará al reconectar');
      }
    }catch{}
    throw e;
  }
}

  // Pie de página
  const np=doc.getNumberOfPages();

async function sincGAS(action){
  const _cost=getCosto();

  const _mats=_insGAS.map(m=>({
    nombre:m.nombre||'',unidad:m.unidad||'und',cantidad:+(m.cantidad||1),
    precioUnit:+(m.precio||0),total:+(m.precio||0)*(+(m.cantidad||1)),
    codAlm:m.codAlm||'',marca:m.tieneMarca===false?'S/M':(m.marca||''),modelo:m.modelo||''
  }));
  const p=action==='cerrar'?{
    action:'registrarOT',otNum:OM.num||'',
    fecha:new Date().toLocaleDateString('es-CO'),
    tipo:OM.tipo||'',prioridad:'Normal',

    mecanico:OM.mecNom||'',cedula:OM.mecCed||'',
    falla:OM.tipo||'',trabajo:_trabajo,causa:OM.tipo||'',

    paro:_cost.mins||0,costoMO:Math.round((_cost.mins||0)*TARIFA),
    estado:OM.cierre?.estado||'',observaciones:OM.cierre?.obs||'',
    autorizaCierre:OM.cierre?.aut||'',
    materiales:_mats,totalMateriales:_mats.reduce((s,m)=>s+(m.total||0),0),
    totalActividades:_actsGAS.length
  }:{action:'borrador',num:OM.num,estado:OM.estado};
  console.log('📤 Enviando GAS:',action,p.otNum||p.num);
  await Promise.race([
    fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p)}),
    new Promise((_,j)=>setTimeout(()=>j(new Error('timeout')),10000))
  ]);
  console.log('✅ GAS OK');
}

function capturar(){
  const get=id=>document.getElementById(id)?.value||'';
  const v=get('f-mec').split('|');if(v[1]){OM.mecCed=v[0];OM.mecNom=v[1];OM.mecCargo=v[2];}
  OM.num=(get('f-num')||OM.num||'').toUpperCase();
  OM.autoriza=get('f-aut')||OM.autoriza||'';
  OM.area=get('f-area')||OM.area||'';
  OM.equipo=get('f-eq')||OM.equipo||'';
  OM.tipo=get('f-tipo')||OM.tipo||'';
  OM.ins_i=[...INS.i];OM.ins_a=[...INS.a];OM.ins_c=[...INS.c];
  OM.fotos_i=[...FOTOS.i];OM.fotos_a=[...FOTOS.a];OM.fotos_c=[...FOTOS.c];
  OM.acts={inicio:[...ACTS.inicio],avance:[...ACTS.avance],cierre:[...ACTS.cierre]};
  OM.chkA={...CHKA};OM.chkC={...CHKC};
  OM.avance={aut:get('f-aut-av')||OM.avance?.aut||''};
  OM.cierre={
    tiempo:get('f-tiempo')||OM.cierre?.tiempo||'',
    estado:get('f-estado')||OM.cierre?.estado||'',
    obs:get('f-obs')||OM.cierre?.obs||'',
    aut:get('f-aut-ci')||OM.cierre?.aut||''
  };
  OM.firmas={};
  ['ma','aa','mc','ac'].forEach(k=>{if(FIR[k]&&FIR[k].dataURL)OM.firmas[k]=FIR[k].dataURL;});

function valI(){
  const get=id=>document.getElementById(id)?.value?.trim()||'';

  if(!OM.mecNom&&!get('f-mec')){toast('⚠️ Seleccione mecánico');return false;}
  if(!OM.autoriza&&!get('f-aut')){toast('⚠️ Ingrese quien autoriza');return false;}
  if(!OM.area&&!get('f-area')){toast('⚠️ Seleccione área');return false;}
  if(!OM.equipo&&!get('f-eq')){toast('⚠️ Seleccione equipo');return false;}
  if(!OM.tipo&&!get('f-tipo')){toast('⚠️ Seleccione tipo de falla');return false;}
  if(!ACTS.inicio.length){toast('⚠️ Agregue al menos una actividad');return false;}
  if(ACTS.inicio.some(a=>!a.desc.trim())){toast('⚠️ Describa todas las actividades');return false;}

function valC(){
  const get=id=>document.getElementById(id)?.value||'';

    <p style="color:var(--gt);font-size:12px;margin-bottom:18px">OM ${OM?.num} · ${all.length} actividades · ${cost.str}</p>
    <button onclick="generarPDF()" style="display:block;width:100%;padding:12px;border-radius:9px;border:none;background:var(--na);color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px">📄 Descargar PDF</button>
    <button onclick="enviarGerencia()" style="display:block;width:100%;padding:12px;border-radius:9px;border:none;background:#2e7d32;color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px">📊 Enviar a App Gerencia</button>
    <button onclick="abrirWA()" style="display:block;width:100%;padding:12px;border-radius:9px;border:none;background:#25d366;color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px">📱 Enviar resumen por WhatsApp</button>
    <button onclick="home()" style="display:block;width:100%;padding:12px;border-radius:9px;border:none;background:var(--az);color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px">🏠 Volver al inicio</button>
    <button onclick="nuevaOM()" style="display:block;width:100%;padding:12px;border-radius:9px;border:1.5px solid var(--gb2);background:var(--gb);color:var(--az);font-weight:700;font-size:14px;cursor:pointer">➕ Nueva OM</button>
  </div>`);
  setTimeout(()=>{try{genWA();}catch(e){}},500);
}
function fmtTS(iso){
  try{const d=new Date(iso);return d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});}
  catch{return iso||'—';}
}
function fCOP(n){return n?'$'+Math.round(n).toLocaleString('es-CO'):'$0';}
// Sanitizar string para jsPDF - evita error "Invalid argument"
function sPDF(v){return String(v==null?'':v).replace(/[\x00-\x1F\x7F]/g,'').trim().substring(0,200)||'';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,d=2500){
  const t=document.getElementById('toast');if(!t)return;
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}
document.addEventListener('DOMContentLoaded',()=>{
  try{const bl=JSON.parse(localStorage.getItem('pst_bib')||'[]');
    bl.forEach(m=>{if(!BIB_ACT.some(x=>x.nombre.toLowerCase()===m.nombre.toLowerCase()))BIB_ACT.push(m);});
  }catch{}
  // Reintentar envíos pendientes
  setTimeout(()=>{
    try{
      const cola=JSON.parse(localStorage.getItem('pst_cola')||'[]');
      if(cola.length){
        console.log('🔄 Reintentando',cola.length,'envíos pendientes');
        Promise.all(cola.map(p=>fetch(GAS,{method:'POST',mode:'no-cors',
          headers:{'Content-Type':'text/plain'},body:JSON.stringify(p)})
          .catch(e=>console.warn('reintento falló:',e.message))
        )).then(()=>localStorage.removeItem('pst_cola'));
      }
    }catch{}
  },3000);
  home();
  document.addEventListener('click',e=>{
    const d=document.getElementById('mat-drop');
    if(d&&!e.target.closest('#mat-bus')&&!e.target.closest('#mat-drop'))d.style.display='none';
  });
  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
});
</script>
</body>
