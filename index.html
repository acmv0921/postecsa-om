<html lang="es">

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>POSTECSA · OM</title>

<style>
:root{
  --naranja:#E65100;--naranja2:#FF6D00;--gris:#263238;--gris2:#37474F;
  --blanco:#FAFAFA;--verde:#2E7D32;--rojo:#C62828;--azul:#1565C0;
  --amarillo:#F9A825;--fondo:#ECEFF1;--card:#FFFFFF;--borde:#B0BEC5;
  --txt:#212121;--txt2:#546E7A;--radio:10px;--sombra:0 2px 8px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--fondo);color:var(--txt);min-height:100vh;font-size:15px}
#app{min-height:100vh}
/* === HEADER === */
.hdr{background:linear-gradient(135deg,var(--naranja),var(--naranja2));color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-logo{height:38px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:3px 6px}.hdr-logo img{height:32px;width:auto;display:block;object-fit:contain}
.hdr-title{flex:1}
.hdr-title h1{font-size:17px;font-weight:700;line-height:1.2}
.hdr-title p{font-size:11px;opacity:.85;margin-top:1px}
.hdr-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600}
/* === CARDS === */
.card{background:var(--card);border-radius:var(--radio);box-shadow:var(--sombra);margin:12px;padding:16px}
.card-title{font-size:13px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title .ico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
/* === FORM ELEMENTS === */
label{display:block;font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--borde);border-radius:8px;font-size:15px;color:var(--txt);background:#fff;outline:none;font-family:inherit;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--naranja)}
textarea{resize:vertical;min-height:80px}
input[type=number]{-moz-appearance:textfield}
/* === BUTTONS === */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;margin-top:10px}
.btn-primary{background:var(--naranja);color:#fff}
.btn-primary:active{background:var(--naranja2);transform:scale(.98)}
.btn-success{background:var(--verde);color:#fff}
.btn-outline{background:#fff;color:var(--naranja);border:2px solid var(--naranja)}
.btn-gris{background:var(--gris2);color:#fff}
.btn-small{padding:9px 14px;font-size:13px;border-radius:6px;margin-top:6px}
.btn-xs{padding:7px 12px;font-size:12px;border-radius:6px;margin-top:4px;width:auto}
.btn-danger{background:var(--rojo);color:#fff}
/* === TABS === */
.tabs{display:flex;background:var(--gris);border-radius:var(--radio) var(--radio) 0 0;overflow:hidden}
.tab{flex:1;padding:12px 8px;text-align:center;color:rgba(255,255,255,.6);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border-bottom:3px solid transparent;position:relative}
.tab.active{color:#fff;border-bottom-color:var(--naranja2);background:rgba(255,255,255,.08)}
.tab-badge{position:absolute;top:4px;right:4px;background:var(--naranja2);color:#fff;border-radius:10px;font-size:10px;padding:1px 5px;min-width:18px}
/* === ACTIVIDAD ITEM === */
.act-item{background:var(--fondo);border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid var(--naranja)}
.act-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.act-desc{font-size:14px;font-weight:600;flex:1}
.act-meta{font-size:11px;color:var(--txt2);margin-top:4px}
.act-costo{font-size:13px;font-weight:700;color:var(--verde);white-space:nowrap}
.btn-del{background:none;border:none;color:var(--rojo);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1}
/* === FOTO GRID === */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.foto-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;border:2px solid var(--borde)}
.foto-add{aspect-ratio:1;border-radius:6px;border:2px dashed var(--borde);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--borde);cursor:pointer;background:var(--fondo)}
.foto-count{font-size:12px;color:var(--txt2);margin-top:6px;text-align:center}
/* === FIRMA === */
.firma-wrap{border:2px solid var(--borde);border-radius:8px;overflow:hidden;background:#fff;margin-top:6px}
.firma-canvas{display:block;width:100%;height:120px;touch-action:none;cursor:crosshair}
.firma-actions{display:flex;gap:8px;padding:8px;background:var(--fondo)}
.firma-ok{font-size:11px;color:var(--verde);font-weight:700;padding-top:4px}
/* === INSUMO === */
.ins-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--fondo);border-radius:6px;margin-bottom:6px}
.ins-desc{flex:1;font-size:13px}
.ins-qty{width:60px;text-align:center;font-size:13px;padding:6px 8px}
/* === CHECKLIST === */
.chk-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--fondo)}
.chk-item:last-child{border-bottom:none}
.chk-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--verde);flex-shrink:0}
.chk-label{font-size:14px;flex:1}
/* === ESTADO CHIPS === */
.chip{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.chip-ok{background:#E8F5E9;color:var(--verde)}
.chip-warn{background:#FFF8E1;color:#F57F17}
.chip-err{background:#FFEBEE;color:var(--rojo)}
/* === HOME LIST === */
.om-item{background:var(--card);border-radius:var(--radio);box-shadow:var(--sombra);margin:8px 12px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .1s}
.om-item:active{transform:scale(.98)}
.om-num{font-size:20px;font-weight:900;color:var(--naranja);min-width:50px}
.om-info{flex:1}
.om-info h3{font-size:14px;font-weight:700}
.om-info p{font-size:12px;color:var(--txt2);margin-top:2px}
.om-estado{font-size:11px;font-weight:700;text-align:right}
/* === TOAST === */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gris);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* === ONLINE BADGE === */
.offline-bar{background:var(--rojo);color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600}
/* === FAB === */
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:28px;background:var(--naranja);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(230,81,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.9)}
/* === AUTOCOMPLETE === */
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--naranja);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:200;box-shadow:var(--sombra)}
.autocomplete-item{padding:10px 13px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--fondo)}
.autocomplete-item:hover,.autocomplete-item:active{background:var(--fondo)}
/* === RESUMEN ETAPA === */
.resumen-etapa{background:var(--fondo);border-radius:8px;padding:12px;margin-top:8px}
.resumen-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.resumen-row.total{font-weight:700;color:var(--verde);border-top:1px solid var(--borde);margin-top:4px;padding-top:8px;font-size:14px}
/* === EXITO === */
.exito-header{background:linear-gradient(135deg,var(--verde),#43A047);color:#fff;border-radius:var(--radio);padding:24px;text-align:center;margin:12px}
.exito-num{font-size:48px;font-weight:900;line-height:1}
.exito-sub{font-size:14px;opacity:.9;margin-top:6px}
.exito-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px}
.exito-card{background:var(--card);border-radius:8px;padding:14px;text-align:center;box-shadow:var(--sombra)}
.exito-val{font-size:20px;font-weight:800;color:var(--naranja)}
.exito-lbl{font-size:11px;color:var(--txt2);margin-top:2px}
/* === SPINNER === */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* === SEPARADOR === */
.sep{height:1px;background:var(--fondo);margin:12px 0}
/* === INFO ROW === */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--fondo);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--txt2);font-size:12px}
.info-val{font-weight:600;text-align:right}
</style>
</head>

// BASE DE DATOS LOCAL
// ═══════════════════════════════════════════════
const DB = {
  getAll(){
    try{
      const d=JSON.parse(localStorage.getItem(CLAVE_DB)||'{}');
      if(typeof d!=='object'||d===null) return {};
      // Filtrar entradas corruptas (sin num)
      const limpio={};
      Object.entries(d).forEach(([k,v])=>{ if(v&&typeof v==='object'&&v.num) limpio[k]=v; });
      return limpio;
    }catch(e){ console.error('DB.getAll error:',e); localStorage.removeItem(CLAVE_DB); return{}; }
  },
  saveOM(om){
    const d=DB.getAll(); d[om.num]=om;
    const str=JSON.stringify(d);
    try{
      localStorage.setItem(CLAVE_DB,str);
    }catch(e){
      if(e.name==='QuotaExceededError'){
        // Intentar guardar sin fotos de etapas anteriores
        console.warn('Cuota llena — guardando sin fotos antiguas');
        const omReducido={...om};
        // Mantener solo fotos de etapa actual
        const etActual=TAB_ACTUAL||'i';
        if(etActual!=='i') delete omReducido.fotos_i;
        if(etActual!=='a') delete omReducido.fotos_a;
        if(etActual!=='c') delete omReducido.fotos_c;
        d[om.num]=omReducido;
        try{ localStorage.setItem(CLAVE_DB,JSON.stringify(d)); }
        catch(e2){ throw e2; }
      } else { throw e; }
    }
  },
  delOM(num){ const d=DB.getAll(); delete d[num]; localStorage.setItem(CLAVE_DB,JSON.stringify(d)); },
  getOM(num){ return DB.getAll()[num]||null; },
  getBib(){ try{const b=JSON.parse(localStorage.getItem(CLAVE_BIB)||'[]'); return b.length?b:BIB_BASE;}catch{return BIB_BASE;} },
  saveBib(b){ localStorage.setItem(CLAVE_BIB,JSON.stringify(b)); },
  getCola(){ try{return JSON.parse(localStorage.getItem(CLAVE_COLA)||'[]')}catch{return[]} },
  saveCola(c){ localStorage.setItem(CLAVE_COLA,JSON.stringify(c)); },

// UTILIDADES
// ═══════════════════════════════════════════════
function sPDF(v){ return String(v==null?'':v).replace(/[\x00-\x1F\x7F]/g,'').trim().substring(0,200)||''; }
function fNum(n){ return Number(n)||0; }
function fCOP(n){ return '$'+Math.round(n).toLocaleString('es-CO'); }
function fFecha(ts){ if(!ts)return'—'; const d=new Date(ts); return d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function ts(){ return Date.now(); }
function uid(){ return Math.random().toString(36).substr(2,8); }

function getCosto(){
  try{
    // Unir memoria + OM, deduplicar por id
    const seen=new Set();
    const all=[];
    [...(ACTS.i||[]),...(ACTS.a||[]),...(ACTS.c||[]),
     ...(OM.acts_i||[]),...(OM.acts_a||[]),...(OM.acts_c||[])].forEach(a=>{
      if(a&&a.id&&!seen.has(a.id)){seen.add(a.id);all.push(a);}
      else if(a&&!a.id) all.push(a); // sin id: incluir siempre
    });
    const totalMin = all.reduce((s,a)=>s+fNum(a&&a.min),0);
    const costo = totalMin*MIN_RATE;
    return {min:totalMin, costo, all};
  }catch(e){ console.error('getCosto error:',e); return {min:0,costo:0,all:[]}; }
}

// ═══════════════════════════════════════════════
// CAPTURAR ESTADO ACTUAL DEL DOM → OM
// ═══════════════════════════════════════════════
function capturar(){
  const g = (id,def='')=>{ const e=document.getElementById(id); return e?e.value:def; };
  // Datos comunes
  if(g('om-num')) OM.num = g('om-num');
  if(g('om-mecanico')) OM.mecanico = g('om-mecanico');
  if(g('om-area')) OM.area = g('om-area');
  if(g('om-equipo')) OM.equipo = g('om-equipo');
  if(g('om-falla')) OM.falla = g('om-falla');
  if(g('om-prioridad')) OM.prioridad = g('om-prioridad');
  if(g('om-obs')) OM.obs_i = g('om-obs');
  if(g('om-obs-a')) OM.obs_a = g('om-obs-a');
  if(g('om-obs-c')) OM.obs_c = g('om-obs-c');
  if(g('om-estado-eq')) OM.estado_equipo = g('om-estado-eq');

  // Actividades: usar memoria si tiene datos, sino preservar lo que hay en OM
  const mrgArr=(mem,saved)=> mem&&mem.length ? [...mem] : [...(saved||[])];
  OM.acts_i = mrgArr(ACTS.i, OM.acts_i);
  OM.acts_a = mrgArr(ACTS.a, OM.acts_a);
  OM.acts_c = mrgArr(ACTS.c, OM.acts_c);

  // Fotos: cada etapa por separado via _fotosEtapa — nunca mezcla
  OM.fotos_i = _fotosEtapa('i');
  OM.fotos_a = _fotosEtapa('a');
  OM.fotos_c = _fotosEtapa('c');

  // Firmas: merge (nunca borrar firma ya confirmada)
  OM.firmas = {...(OM.firmas||{}), ...FIR};
  // Nombres supervisor → OM
  ['sup_nom_a','sup_nom_c'].forEach(k=>{ const e=document.getElementById(k); if(e) OM[k]=e.value; });

  // Insumos: mismo patrón merge
  OM.ins_i = mrgArr(INS.i, OM.ins_i);
  OM.ins_a = mrgArr(INS.a, OM.ins_a);
  OM.ins_c = mrgArr(INS.c, OM.ins_c);

  // Checklist
  const chkA=[]; document.querySelectorAll('.chk-a').forEach(cb=>chkA.push(cb.checked));
  const chkC=[]; document.querySelectorAll('.chk-c').forEach(cb=>chkC.push(cb.checked));
  if(chkA.length) OM.chk_a = chkA;
  if(chkC.length) OM.chk_c = chkC;
  // Guardar justificaciones de ítems no marcados
  const justA=[]; document.querySelectorAll('.chk-just-a').forEach(inp=>justA.push(inp.value||''));
  const justC=[]; document.querySelectorAll('.chk-just-c').forEach(inp=>justC.push(inp.value||''));
  if(justA.length) OM.chk_just_a = justA;
  if(justC.length) OM.chk_just_c = justC;

  // Costo
  const {min,costo} = getCosto();
  OM.min_total = min;
  OM.costo_mo = costo;

  DB.saveOM(OM);
}

// RESTAURAR ESTADO OM → VARIABLES EN MEMORIA
// ═══════════════════════════════════════════════
function restaurar(om){
  OM = om;
  ACTS = { i:[...(om.acts_i||[])], a:[...(om.acts_a||[])], c:[...(om.acts_c||[])] };
  FOTOS = {
    i:(om.fotos_i||[]).map(f=>({data:f.data,ts:f.ts,et:'i'})),
    a:(om.fotos_a||[]).map(f=>({data:f.data,ts:f.ts,et:'a'})),
    c:(om.fotos_c||[]).map(f=>({data:f.data,ts:f.ts,et:'c'})),
  };
  FIR = {...(om.firmas||{})};
  INS = { i:[...(om.ins_i||[])], a:[...(om.ins_a||[])], c:[...(om.ins_c||[])] };
  CHK = { a:[...(om.chk_a||[])], c:[...(om.chk_c||[])] };
  OM.chk_just_a = om.chk_just_a||[];
  OM.chk_just_c = om.chk_just_c||[];
}

function limpiarFotosAntiguas(){
  // Eliminar fotos de OMs cerradas para liberar espacio

  let liberado=false;
  Object.values(d).forEach(om=>{
    if(om.etapa==='CERRADA'&&(om.fotos_i||om.fotos_a||om.fotos_c)){
      delete om.fotos_i; delete om.fotos_a; delete om.fotos_c;
      d[om.num]=om; liberado=true;
    }
  });
  if(liberado){
    try{ localStorage.setItem(CLAVE_DB,JSON.stringify(d)); toast('🗑 Fotos antiguas eliminadas para liberar espacio'); }
    catch(e){ console.error('No se pudo liberar espacio:',e); }
  }
}

function sincronizarSupervisor(){
  if(!navigator.onLine){toast('Sin conexion');return;}
  fetch(GAS_GERENCIA+'?accion=todas_oms')
    .then(function(r){return r.json();})
    .then(function(res){
      var panel=document.getElementById('panel-supervisor');
      if(!panel) return;
      if(!res.ok||!res.oms||!res.oms.length){
        panel.innerHTML='<div class="card" style="text-align:center;padding:24px;color:var(--txt2)">Sin OMs registradas</div>';return;
      }
      var oms=res.oms.filter(function(o){return o.num&&o.num!=='N_OM';});
      if(!oms.length){
        panel.innerHTML='<div class="card" style="text-align:center;padding:24px;color:var(--txt2)"><div style="font-size:36px">\ud83d\udccb</div><p style="margin-top:8px">No hay \u00f3rdenes</p></div>';return;
      }
      var badge=function(e){
        var c={PENDIENTE:{b:'#FFF3E0',t:'#E65100'},TOMADA:{b:'#E3F2FD',t:'#1565C0'},CERRADA:{b:'#E8F5E9',t:'#2E7D32'}};
        var s=c[e]||{b:'#F5F5F5',t:'#546E7A'};
        return '<span style="background:'+s.b+';color:'+s.t+';border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">'+e+'</span>';
      };
      var seccion=function(titulo,lista,col){
        if(!lista.length) return '';
        return '<div class="card" style="border-left:4px solid '+col+'">'
          +'<div class="card-title" style="color:'+col+'">'+titulo
          +' <span style="margin-left:auto">'+lista.length+'</span></div>'
          +lista.map(function(o){
            return '<div style="padding:10px 0;border-bottom:1px solid var(--fondo)">'
              +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
              +'<div>'
              +'<div style="font-weight:700;font-size:14px">#'+sPDF(o.num)+' \u00b7 '+sPDF(o.equipo)+'</div>'
              +'<div style="font-size:12px;color:var(--txt2)">'+sPDF(o.area)+' \u00b7 '+sPDF(o.falla)+'</div>'
              +'<div style="font-size:12px;color:var(--txt2)">\ud83d\udea7 '+sPDF(o.mec_nom)+'</div>'
              +'</div>'+badge(o.estado)+'</div></div>';
          }).join('')+'</div>';
      };
      panel.innerHTML=
        seccion('\ud83d\udd34 PENDIENTES',oms.filter(function(o){return o.estado==='PENDIENTE';}),'#E65100')
        +seccion('\ud83d\udd35 EN TRABAJO',oms.filter(function(o){return o.estado==='TOMADA';}),'#1565C0')
        +seccion('\ud83d\udfe2 CERRADAS',oms.filter(function(o){return o.estado==='CERRADA';}),'#2E7D32');
    }).catch(function(){toast('Error al cargar');});
}

function crearOMSupervisor(){
  var num=(document.getElementById('sup-num').value||'').trim();
  var mecVal=(document.getElementById('sup-mec').value||'');
  var area=(document.getElementById('sup-area').value||'');
  var equipo=(document.getElementById('sup-equipo').value||'');
  var falla=(document.getElementById('sup-falla').value||'');
  var tipo_mant=(document.getElementById('sup-tipo-mant').value||'');
  var prio=(document.getElementById('sup-prioridad').value||'MEDIA');
  var obs=(document.getElementById('sup-obs').value||'');
  if(!num){toast('Ingrese el numero de OM');return;}
  if(!mecVal){toast('Seleccione el mecanico');return;}
  if(!area){toast('Seleccione el area');return;}
  if(!equipo){toast('Seleccione el equipo');return;}
  if(!falla){toast('Seleccione el tipo de falla');return;}
  if(!tipo_mant){toast('Seleccione el tipo de mantenimiento');return;}
  if(!navigator.onLine){toast('Sin conexion');return;}
  var parts=mecVal.split('|');
  var mec_cc=parts[0], mec_nom=parts[1]||'';
  toast('Enviando al mecanico...');
  fetch(GAS_GERENCIA,{
    method:'POST',
    body:JSON.stringify({accion:'crear_om',num:num,fecha:new Date().toLocaleDateString('es-CO'),area:area,equipo:equipo,falla:falla,tipo_mant:tipo_mant,prioridad:prio,mec_cc:mec_cc,mec_nom:mec_nom,obs_i:obs}),
    headers:{'Content-Type':'text/plain'}
  }).then(function(r){return r.json();})
    .then(function(res){
      if(res.ok){toast('OM #'+num+' asignada a '+mec_nom);showHome();}
      else toast('Error: '+(res.error||'desconocido'));
    }).catch(function(){toast('Sin conexion');});
}

function tomarOM(numOM){
  if(!navigator.onLine){toast('Necesita conexion para tomar la OM');return;}
  fetch(GAS_GERENCIA+'?accion=mis_oms&cc='+encodeURIComponent(USER_CC))
    .then(function(r){return r.json();})
    .then(function(res){
      if(!res.ok||!res.oms) return;
      var omData=res.oms.find(function(o){return o.num===numOM;});
      if(!omData){toast('OM no encontrada');return;}
      if(DB.getOM(omData.num)){abrirOM(omData.num);return;}
      var om={
        num:omData.num,area:omData.area,equipo:omData.equipo,
        falla:omData.falla,tipo_mant:omData.tipo_mant||'',prioridad:omData.prioridad,obs_i:omData.obs_i,
        mecanico:omData.mec_cc,mecanico_nombre:omData.mec_nom,
        etapa:'INICIO',ts_inicio:Date.now(),origen:'supervisor',
      };
      DB.saveOM(om);
      fetch(GAS_GERENCIA,{method:'POST',body:JSON.stringify({accion:'tomar_om',num:om.num}),headers:{'Content-Type':'text/plain'},mode:'no-cors'}).catch(function(){});
      restaurar(om); TAB_ACTUAL='i'; showForm();
      toast('OM #'+om.num+' iniciada');
    }).catch(function(){toast('Error al cargar OM');});
}

    <div class="card">
      <div class="card-title"><span class="ico" style="background:#FFEBEE">🗑</span>ÓRDENES CERRADAS
        <span style="margin-left:auto;font-size:12px;color:var(--txt2)">${cerradas.length} registros</span>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button onclick="selTodosCerrados(true)" class="btn btn-outline btn-xs" style="flex:1">☑ Todos</button>
        <button onclick="selTodosCerrados(false)" class="btn btn-gris btn-xs" style="flex:1">☐ Ninguno</button>
      </div>

      <div id="lista-cerradas">

      </div>

      <button class="btn btn-danger" style="margin-top:14px" onclick="borrarSeleccionados()">
        🗑 BORRAR SELECCIONADOS
      </button>
      <button class="btn btn-danger" style="margin-top:8px;background:#7B1FA2" onclick="borrarTodoCerradas()">
        ⚠️ BORRAR TODAS LAS CERRADAS
      </button>
    </div>`:`
    <div class="card" style="text-align:center;padding:30px">
      <div style="font-size:36px">✅</div>
      <p style="margin-top:8px;color:var(--txt2)">No hay órdenes cerradas</p>
    </div>`}

    ${abiertas.length>0?`
    <div class="card">
      <div class="card-title"><span class="ico" style="background:#FFF3E0">📋</span>ÓRDENES ABIERTAS</div>
      ${abiertas.map(o=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--fondo)">

function selTodosCerrados(sel){
  document.querySelectorAll('.chk-borrar').forEach(c=>c.checked=sel);
}

function borrarSeleccionados(){
  const seleccionados=[...document.querySelectorAll('.chk-borrar:checked')].map(c=>c.value);
  if(!seleccionados.length){ toast('⚠️ Seleccione al menos una OM'); return; }
  const conf=confirm('¿Borrar '+seleccionados.length+' orden'+(seleccionados.length>1?'es':'')+' de mantenimiento?\n\nEsta acción NO se puede deshacer.');
  if(!conf) return;
  const conf2=confirm('⚠️ CONFIRMACIÓN FINAL\n\nSe eliminarán permanentemente:\n'+seleccionados.map(n=>'• OM #'+n).join('\n')+'\n\n¿Está seguro?');
  if(!conf2) return;
  seleccionados.forEach(num=>DB.delOM(num));
  toast('✅ '+seleccionados.length+' OM borrada'+(seleccionados.length>1?'s':''));
  showGestionar();
}

function borrarTodoCerradas(){
  const oms=DB.getAll();
  const cerradas=Object.values(oms).filter(o=>o&&o.etapa==='CERRADA');
  if(!cerradas.length){ toast('No hay OMs cerradas'); return; }
  const conf=confirm('⚠️ BORRAR TODAS LAS ÓRDENES CERRADAS\n\n'+cerradas.length+' orden'+(cerradas.length>1?'es':'')+' se eliminarán permanentemente.\n\n¿Continuar?');
  if(!conf) return;
  const conf2=confirm('⚠️ CONFIRMACIÓN FINAL\n\n¿Está completamente seguro de borrar las '+cerradas.length+' órdenes cerradas?\n\nEsta acción NO se puede deshacer.');
  if(!conf2) return;
  cerradas.forEach(o=>DB.delOM(o.num));
  toast('✅ '+cerradas.length+' OM'+(cerradas.length>1?'s':'')+' cerrada'+(cerradas.length>1?'s':'')+' eliminada'+(cerradas.length>1?'s':''));
  showHome();
}

function confirmarBorrarUna(num){
  const om=DB.getOM(num);
  if(!om){ toast('OM no encontrada'); return; }
  const conf=confirm('¿Borrar OM #'+num+' ('+String(om.equipo||'')+')?\n\nEsta acción NO se puede deshacer.');
  if(!conf) return;
  DB.delOM(num);
  toast('✅ OM #'+num+' eliminada');
  showGestionar();
}

function chkNuevoMec(val){
  const wrap=document.getElementById('nuevo-mec-wrap');
  if(wrap) wrap.style.display=val==='__nuevo__'?'block':'none';
}

function guardarNuevoMec(){
  const nombre=document.getElementById('nuevo-mec-nombre').value.trim().toUpperCase();
  const cc=document.getElementById('nuevo-mec-cc').value.trim();
  const cargo=document.getElementById('nuevo-mec-cargo').value;
  if(!nombre){toast('⚠️ Ingrese el nombre');return;}
  if(!cc){toast('⚠️ Ingrese la cédula');return;}
  // Verificar que no exista
  if(MECANICOS.find(m=>m.cc===cc)){toast('⚠️ Ya existe un mecánico con esa cédula');return;}
  // Agregar al array global
  MECANICOS.push({cc,nombre,cargo});
  // Guardar en localStorage
  try{localStorage.setItem('pst_mecanicos',JSON.stringify(MECANICOS));}catch(e){}
  // Actualizar el select
  const sel=document.getElementById('om-mecanico');
  if(sel){
    // Remover opción __nuevo__ y agregar el nuevo antes
    const opts=Array.from(sel.options).filter(o=>o.value!=='__nuevo__');
    sel.innerHTML=opts.map(o=>`<option value="${o.value}">${o.text}</option>`).join('')
      +'<option value="'+cc+'" selected>'+nombre+' ('+cargo+')</option>'
      +'<option value="__nuevo__">➕ Agregar mecánico nuevo...</option>';
    sel.value=cc;
  }
  document.getElementById('nuevo-mec-wrap').style.display='none';
  toast('✅ Mecánico '+nombre+' agregado');
}

function actualizarEquipos(){
  const area = document.getElementById('om-area').value;
  const sel = document.getElementById('om-equipo');
  const equipos = AREAS_EQUIPOS[area]||[];
  sel.innerHTML = equipos.length
    ? '<option value="">— Seleccionar equipo —</option>'+equipos.map(e=>`<option value="${e}">${e}</option>`).join('')
    : '<option value="">— Primero seleccione área —</option>';
}

function iniciarOM(){
  const num = document.getElementById('om-num').value.trim();
  const mec = document.getElementById('om-mecanico').value;
  const area = document.getElementById('om-area').value;
  const eq = document.getElementById('om-equipo').value;
  const falla = document.getElementById('om-falla').value;

  if(!num){ toast('⚠️ Ingrese el número de OM'); return; }
  if(!mec){ toast('⚠️ Seleccione el mecánico'); return; }
  if(!area){ toast('⚠️ Seleccione el área'); return; }
  if(!eq){ toast('⚠️ Seleccione el equipo'); return; }
  if(!falla){ toast('⚠️ Seleccione el tipo de falla'); return; }

  if(DB.getOM(num)){ toast('⚠️ Ya existe una OM con ese número'); return; }

  OM.num = num;
  OM.mecanico = mec;
  OM.mecanico_nombre = MECANICOS.find(m=>m.cc===mec)?.nombre||mec;
  OM.area = area;
  OM.equipo = eq;
  OM.falla = falla;
  OM.prioridad = document.getElementById('om-prioridad').value;
  OM.obs_i = document.getElementById('om-obs').value;
  OM.etapa = 'INICIO';
  OM.ts_inicio = ts();

  DB.saveOM(OM);
  TAB_ACTUAL = 'i';
  showForm();
  toast('✅ OM creada correctamente');
}

    [...(ACTS[et]||[]),...(OM['acts_'+et]||[])].forEach(a=>{if(a&&(a.id?!seen.has(a.id):(seen.add(Math.random()),true))){if(a.id)seen.add(a.id);n++;}});
    [...(FOTOS[et]||[]),...(OM['fotos_'+et]||[])].forEach(f=>{if(f&&f.data&&!seen.has(f.data)){seen.add(f.data);n++;}});

  };
  const cI=_cnt('i'), cA=_cnt('a'), cC=_cnt('c');

  const etapa = OM.etapa||'INICIO';

  R(`

    <div class="card" style="padding:12px">
      <div class="info-row"><span class="info-label">Mecánico</span><span class="info-val">${sPDF(OM.mecanico_nombre||OM.mecanico)}</span></div>
      <div class="info-row"><span class="info-label">Falla</span><span class="info-val" style="max-width:60%;text-align:right;font-size:12px">${sPDF(OM.falla)}</span></div>
      <div class="info-row"><span class="info-label">Inicio</span><span class="info-val">${fFecha(OM.ts_inicio)}</span></div>
      <div class="info-row"><span class="info-label">Costo M.O.</span><span class="info-val" style="color:var(--verde)">${fCOP(getCosto().costo)}</span></div>
    </div>

    <!-- TABS -->
    <div style="margin:0 12px">
      <div class="tabs">
        <div class="tab ${TAB_ACTUAL==='i'?'active':''}" onclick="cambiarTab('i')">
          INICIO${cI>0?`<span class="tab-badge">${cI}</span>`:''}
        </div>
        <div class="tab ${TAB_ACTUAL==='a'?'active':''}" onclick="cambiarTab('a')" style="${!enAvance?'opacity:.4;pointer-events:none':''}">
          AVANCE${cA>0?`<span class="tab-badge">${cA}</span>`:''}
        </div>
        <div class="tab ${TAB_ACTUAL==='c'?'active':''}" onclick="cambiarTab('c')" style="${!enCierre?'opacity:.4;pointer-events:none':''}">
          CIERRE${cC>0?`<span class="tab-badge">${cC}</span>`:''}
        </div>
      </div>
      <div id="tab-content">
        ${renderTab(TAB_ACTUAL)}

    <!-- BOTONES DE AVANCE -->

function addActividad(et){
  const desc = document.getElementById('act-desc').value.trim();
  const resp = document.getElementById('act-resp').value;
  const min = fNum(document.getElementById('act-min').value);
  if(!desc){ toast('⚠️ Ingrese la descripción'); return; }
  if(min<=0){ toast('⚠️ Ingrese el tiempo en minutos'); return; }

  if(!ACTS[et]) ACTS[et]=[];
  ACTS[et].push({id:uid(),desc,resp:resp||OM.mecanico_nombre,min,ts:ts()});

  // Guardar inmediatamente
  OM['acts_'+et] = [...ACTS[et]];
  DB.saveOM(OM);

  toast('✅ Actividad guardada');
  TAB_ACTUAL = et;
  showForm();
}

function delAct(et,idx){
  if(!confirm('¿Eliminar actividad?')) return;
  ACTS[et].splice(idx,1);
  OM['acts_'+et] = [...ACTS[et]];
  DB.saveOM(OM);
  cambiarTab(et);
}

function filtrarBib(){
  const q = document.getElementById('ins-buscar').value.toLowerCase();
  const lista = document.getElementById('ins-lista');
  if(q.length<2){ lista.style.display='none'; return; }
  const matches = BIB.filter(b=>b.n.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){ lista.style.display='none'; return; }
  lista.innerHTML = matches.map((b,i)=>`<div class="autocomplete-item" onclick="selBib(${BIB.indexOf(b)})">${b.n} — ${b.u} — ${fCOP(b.p)}</div>`).join('');
  lista.style.display='block';
}

function selBib(idx){
  const b=BIB[idx];
  document.getElementById('ins-buscar').value=b.n;
  document.getElementById('ins-sel-n').value=b.n;
  document.getElementById('ins-sel-u').value=b.u;
  document.getElementById('ins-sel-p').value=b.p;
  document.getElementById('ins-lista').style.display='none';
  document.getElementById('ins-preview').style.display='block';
  document.getElementById('ins-prev-n').textContent=b.n+' ('+b.u+')';
  document.getElementById('ins-prev-p').textContent='Precio: '+fCOP(b.p)+' por '+b.u;
}

function addInsumoDesde(et){

// FOTOS — FIX: guardar inmediatamente al agregar

function _fotosEtapa(et){
  const seen=new Set(),fotos=[];
  [...(FOTOS[et]||[]),...(OM['fotos_'+et]||[])].forEach(f=>{
    if(f&&f.data&&!seen.has(f.data)){seen.add(f.data);fotos.push({data:f.data,ts:f.ts||0,et});}
  });
  return fotos;
}

function _actualizarGridFotos(et){
  const fotos=_fotosEtapa(et);
  const grid=document.getElementById('foto-grid-'+et);
  if(grid){
    grid.innerHTML=fotos.map((f,i)=>`
      <div style="position:relative">
        <img class="foto-thumb" src="${f.data}" alt="Foto ${i+1}">
        <button onclick="delFoto('${et}',${i})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer">×</button>
      </div>`).join('');
    const badge=document.getElementById('foto-badge-'+et);
    if(badge){badge.textContent=fotos.length+' / mín. 3';badge.style.background=fotos.length>=3?'var(--verde)':'var(--rojo)';}
    const aviso=document.getElementById('foto-aviso-'+et);
    if(aviso) aviso.style.display=fotos.length<3?'block':'none';
  } else if(document.getElementById('tab-content')){
    document.getElementById('tab-content').innerHTML=renderTab(et);
    setTimeout(()=>initFirmas(),150);
  }
}

function procFotos(et,files){
  if(!files||!files.length) return;
  let procesadas=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      // Comprimir antes de guardar
      const img=new Image();
      img.onload=()=>{
        const cv=document.createElement('canvas');
        const MAX=1200;
        let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        // Comprimir agresivamente: max 800px, calidad 0.45 (~50-80KB por foto)
        const MAX2=800;
        let w2=cv.width, h2=cv.height;
        if(w2>MAX2){h2=Math.round(h2*MAX2/w2);w2=MAX2;}
        if(h2>MAX2){w2=Math.round(w2*MAX2/h2);h2=MAX2;}
        const cv2=document.createElement('canvas');
        cv2.width=w2; cv2.height=h2;
        cv2.getContext('2d').drawImage(cv,0,0,w2,h2);
        const data=cv2.toDataURL('image/jpeg',0.45);

        if(!FOTOS[et]) FOTOS[et]=[];
        FOTOS[et].push({data,ts:ts()});

        // FIX CRÍTICO: guardar inmediatamente sin esperar capturar()
        OM['fotos_'+et]=[...FOTOS[et]];
        try{
          DB.saveOM(OM);
        }catch(e){
          if(e.name==='QuotaExceededError'){
            toast('⚠️ Almacenamiento lleno — eliminando fotos antiguas...');
            limpiarFotosAntiguas();
            try{ DB.saveOM(OM); }catch(e2){ console.warn('Sin espacio:',e2); }
          }
        }

        procesadas++;
        // Actualizar badge y grid INMEDIATAMENTE tras cada foto
        _actualizarGridFotos(et);
        if(procesadas===files.length){
          toast(procesadas+' foto'+(procesadas>1?'s':'')+' guardada'+(procesadas>1?'s':''));
        }
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function delFoto(et,idx){
  FOTOS[et].splice(idx,1);
  OM['fotos_'+et]=[...FOTOS[et]];

  cambiarTab(et);
}

function initFirmas(){
  document.querySelectorAll('.firma-canvas').forEach(cv=>{
    const k=cv.dataset.key;
    const ctx=cv.getContext('2d');
    // Restaurar firma guardada si existe
    if(FIR[k]||OM.firmas?.[k]){
      const src=FIR[k]||OM.firmas[k];
      const img=new Image();
      img.onload=()=>{
        cv.width=cv.offsetWidth||cv.getBoundingClientRect().width||300;
        cv.height=120;
        ctx.clearRect(0,0,cv.width,cv.height);
        ctx.drawImage(img,0,0,cv.width,cv.height);
      };
      img.src=src;
      return;
    }
    cv.width=cv.offsetWidth||cv.getBoundingClientRect().width||300;
    cv.height=120;
    let drawing=false,lx=0,ly=0;
    const pos=(e)=>{
      const r=cv.getBoundingClientRect();
      const src=e.touches?e.touches[0]:e;
      return{x:src.clientX-r.left,y:src.clientY-r.top};
    };
    const start=e=>{e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;ctx.beginPath();ctx.moveTo(lx,ly);};
    const move=e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.lineWidth=2.5;ctx.lineCap='round';ctx.strokeStyle='#000';ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;};
    const end=()=>{drawing=false;};
    cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',end);
    cv.addEventListener('touchstart',start,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',end);
  });
}

function confirmarF(k){

  const ctx=cv.getContext('2d');

// AVANZAR ETAPA
// ═══════════════════════════════════════════════
function avanzarEtapa(nuevaEtapa){
  // Validar mínimo 3 fotos en etapa actual
  const etActual = nuevaEtapa==='AVANCE'?'i':nuevaEtapa==='CIERRE'?'a':'i';
  const fotosEt = _fotosEtapa(etActual);
  if(fotosEt.length < 3){
    const etNom = etActual==='i'?'Inicio':'Avance';
    // Navegar al tab con el problema
    TAB_ACTUAL=etActual;
    if(document.getElementById('tab-content')){
      document.getElementById('tab-content').innerHTML=renderTab(etActual);
      setTimeout(()=>initFirmas(),150);
    }
    toast('⚠️ Mínimo 3 fotos en '+etNom+' ('+fotosEt.length+' cargada'+(fotosEt.length!==1?'s':'')+')');
    return;
  }
  try{
    capturar();
  }catch(e){ console.warn('capturar() error:',e); }

  OM.etapa = nuevaEtapa;
  if(nuevaEtapa==='AVANCE') OM.ts_avance = ts();
  if(nuevaEtapa==='CIERRE') OM.ts_cierre = ts();

  // Preservar fotos/actividades de etapas anteriores que ya estaban en OM
  // (por si capturar() las sobreescribió con arrays vacíos desde memoria)
  try{ DB.saveOM(OM); }catch(e){ console.error('saveOM error:',e); alert('Error al guardar: '+e.message); return; }

  TAB_ACTUAL = nuevaEtapa==='AVANCE'?'a':'c';
  toast('✅ Pasado a etapa '+nuevaEtapa);
  showForm();
}

function enviarGerencia(om){
  const ins_total=[...(om.ins_i||[]),...(om.ins_a||[]),...(om.ins_c||[])];
  const fecha=new Date(om.ts_inicio).toLocaleDateString('es-CO');
  const mecanico=om.mecanico_nombre||om.mecanico||'';
  const equipo=om.equipo||'';
  const otNum=String(om.num||'');

  const filas=ins_total.length
    ?ins_total.map(i=>({accion:'guardar_material',fecha,otNum,equipo,mecanico,
        desc:String(i.n||''),cant:Number(i.qty||1),um:String(i.u||'Und'),precio:Number(i.p||0)}))
    :[{accion:'guardar_material',fecha,otNum,equipo,mecanico,
        desc:'Mano de obra - '+String(om.falla||''),
        cant:Number(om.min_total||0),um:'min',precio:MIN_RATE}];

  console.log('[GAS Gerencia] Enviando',filas.length,'filas');
  console.log('[GAS Gerencia] Payload[0]:',JSON.stringify(filas[0]));

  Promise.all(filas.map(fila=>fetch(GAS_GERENCIA,{
    method:'POST',body:JSON.stringify(fila),
    headers:{'Content-Type':'text/plain'},mode:'no-cors'
  }).catch(e=>console.warn('[GAS] err:',e))))
  .then(()=>toast('Gerencia: '+filas.length+' fila(s) enviada(s)'))
  .catch(err=>{
    const cola=DB.getCola();
    filas.forEach(f=>{ const c=Object.assign({},f); c._ts_cola=ts(); cola.push(c); });
    DB.saveCola(cola);
    toast('Sin conexion - reintentara luego');
  });
}


function procesarCola(){
  const cola=DB.getCola();
  if(!cola.length) return;
  const pendientes=[...cola];

  pendientes.forEach(p=>{

// ═══════════════════════════════════════════════
// GENERACIÓN PDF
// ═══════════════════════════════════════════════
function generarPDF(){
  if(typeof window.jspdf==='undefined'){ toast('⚠️ PDF no disponible aún, espere...'); return; }
  toast('⏳ Generando PDF...');
  setTimeout(()=>{
    try{ _generarPDF(); }
    catch(e){ console.error('PDF error:',e); toast('❌ Error al generar PDF: '+e.message); }
  },100);
}

function _generarPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=14,CW=W-M*2;
  const N=[230,81,0],GO=[33,33,33],GM=[84,110,122],GL=[207,216,220],GF=[245,245,245],VE=[46,125,50],BL=[255,255,255];
  let y=0;

  const rC=()=>doc.setTextColor(...GO);
  const nP=(h=14)=>{ if(y+h>276){doc.addPage();y=16;} };

  const TX=(txt,x,w,sz=9,bold=false,color=GO)=>{
    doc.setFontSize(sz);doc.setFont('helvetica',bold?'bold':'normal');
    doc.setTextColor(...color);
    const lines=doc.splitTextToSize(String(txt==null?'':txt).replace(/[\x00-\x1F]/g,''),w);
    lines.forEach(l=>{ nP(sz*0.42+1); doc.text(l,x,y); y+=sz*0.42; });
  };

  const SEC=(titulo)=>{
    nP(12); y+=3;
    doc.setFillColor(...N); doc.rect(M,y-3.5,3,7,'F');
    doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.setTextColor(...N);
    doc.text(titulo,M+7,y);
    doc.setDrawColor(...GL);doc.setLineWidth(0.3);
    doc.line(M+7,y+1.5,W-M,y+1.5);
    rC(); y+=7;
  };

  const KV=(k,v,xL,xR,wR)=>{
    nP(8);
    doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(...GM);
    doc.text(String(k),xL,y);
    doc.setFont('helvetica','normal');doc.setTextColor(...GO);
    const ls=doc.splitTextToSize(String(v==null?'—':v),wR);
    ls.forEach((l,i)=>doc.text(l,xR,y+i*4));
    y+=Math.max(7,ls.length*4+1);
  };

  // ENCABEZADO

function _generarPDFBase64(){
  // Igual que _generarPDF pero retorna base64 en vez de descargar
  try{
    const {jsPDF}=window.jspdf;
    // Guardar el método save original y reemplazarlo temporalmente
    const docTmp=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    // Usar output() para obtener base64 sin descargar
    // Re-usar la lógica de _generarPDF generando el doc y retornando base64
    // Para no duplicar código, llamamos _generarPDF con flag de no-descarga
    // Implementación simplificada: resumen ejecutivo para Drive
    const W=210,M=14,CW=W-M*2;
    const N=[230,81,0],GO=[33,33,33],GM=[84,110,122],GL=[207,216,220],GF=[245,245,245],VE=[46,125,50],BL=[255,255,255];
    const doc=docTmp; let y=0;
    const nP=(h=14)=>{ if(y+h>276){doc.addPage();y=16;} };
    // Header
    doc.setFillColor(...N);doc.rect(0,0,W,32,'F');
    try{doc.addImage(LOGO_SRC,'JPEG',M,7,52,17.7);}catch(e){}
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(...BL);
    doc.text('ORDEN DE MANTENIMIENTO',M+57,13);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(255,208,160);
    doc.text('POSTEC DE OCCIDENTE S.A.S.',M+57,19);
    doc.setFillColor(...BL);doc.roundedRect(W-44,4,30,24,2,2,'F');
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(...GM);
    doc.text('N° OM',W-29,11,'center');
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(...N);
    doc.text(String(OM.num||''),W-29,22,'center');
    y=40;
    // Datos
    const kv=(k,v)=>{nP(8);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...GM);doc.text(k,M,y);doc.setFont('helvetica','normal');doc.setTextColor(...GO);doc.text(String(v||''),M+45,y);y+=7;};
    kv('Equipo',OM.equipo||'');kv('Area',OM.area||'');kv('Mecanico',OM.mecanico_nombre||OM.mecanico||'');
    kv('Tipo mant.',OM.tipo_mant||'CORRECTIVO');kv('Falla',OM.falla||'');kv('Estado',OM.estado_equipo||'OPERATIVO');
    kv('Inicio',fFecha(OM.ts_inicio));kv('Cierre',fFecha(OM.ts_cierre_final||OM.ts_cierre||0));
    y+=4;
    const {min,costo}=getCosto();
    const ins=[...(INS.i||OM.ins_i||[]),...(INS.a||OM.ins_a||[]),...(INS.c||OM.ins_c||[])];
    const cm=ins.reduce((s,i)=>s+(fNum(i.p)*fNum(i.qty)),0);
    doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(...VE);
    doc.text('COSTO TOTAL: '+fCOP(costo+cm),M,y);
    // Fotos
    const addF=(et,lab)=>{
      const seen=new Set(),uniq=[];
      [...(FOTOS[et]||[]),...(OM['fotos_'+et]||[])].forEach(f=>{if(f&&f.data&&!seen.has(f.data)){seen.add(f.data);uniq.push(f);}});
      if(!uniq.length)return;
      doc.addPage();y=16;
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(...N);doc.text('FOTOS '+lab.toUpperCase(),M,y);y+=8;
      const iW=(CW-4)/3,iH=iW*0.75;let col=0;
      uniq.forEach((f,i)=>{
        if(col===0&&i>0){y+=iH+8;}nP(iH+10);
        try{doc.addImage(f.data,'JPEG',M+col*(iW+2),y,iW,iH);}catch(e){}
        col++;if(col===3){col=0;y+=iH+8;}
      });
      if(col>0)y+=iH+8;
    };
    addF('i','Inicio');addF('a','Avance');addF('c','Cierre');
    return doc.output('datauristring').split(',')[1];
  }catch(e){console.error('_generarPDFBase64 err:',e);return null;}
}

function _subirPDFDrive_OLD(txtResumen){
  try{
    const {jsPDF}=window.jspdf;
    if(!jsPDF){ _enviarWA(txtResumen,null); return; }

    // Generar el PDF completo igual que _generarPDF pero retornar base64
    const _docGuardado=_generarPDFBase64();
    if(!_docGuardado){ _enviarWA(txtResumen,null); return; }
    const pdfB64=_docGuardado;
    const nombre='OM_'+String(OM.num||'')+'_POSTECSA.pdf';

    toast('Subiendo PDF a Drive...');

    // Subir via formulario oculto (bypasea CORS) y luego GET para recuperar link
    toast('Subiendo PDF a Drive...');
    const formData = new FormData();
    formData.append('accion', 'subir_pdf');
    formData.append('pdf', pdfB64);
    formData.append('nombre', nombre);
    formData.append('otNum', String(OM.num||''));

    fetch(GAS_GERENCIA, {
      method: 'POST',
      body: formData,
      mode: 'no-cors',
    }).then(()=>{
      // Dar 3s al GAS para procesar, luego hacer GET para recuperar el link
      setTimeout(()=>{
        fetch(GAS_GERENCIA+'?accion=get_pdf_link&otNum='+encodeURIComponent(String(OM.num||'')))
          .then(r=>r.json())
          .then(res=>{
            if(res.ok && res.link){
              toast('PDF en Drive listo');
              _enviarWA(txtResumen, res.link);
            } else {
              toast('Enviando resumen');
              _enviarWA(txtResumen, null);
            }
          })
          .catch(()=>_enviarWA(txtResumen, null));
      }, 3000);
    }).catch(()=>_enviarWA(txtResumen, null));

  }catch(e){
    console.warn('_subirPDFDrive err:',e);
    _enviarWA(txtResumen,null);
  }
}

      '<div style="padding:20px;background:#fff;color:#c00;font-family:monospace;font-size:13px">' +
      '<b>ERROR en showHome():</b><br>' + e.message + '<br><br>' +
      '<b>Stack:</b><br>' + (e.stack||'sin stack') +
      '</div>';
  }
});
</script>
</body>
